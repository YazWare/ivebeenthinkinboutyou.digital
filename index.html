<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>for you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0705;
      --surface: #110e0b;
      --text: #e8ddd0;
      --muted: #6b5f55;
      --accent: #c8a97e;
      --red: #8b3a3a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      width: 1px; height: 1px;
      background: var(--accent);
      border-radius: 50%;
      animation: drift linear infinite;
      opacity: 0;
    }
    @keyframes drift {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-10vh) translateX(var(--dx)); opacity: 0; }
    }

    .count-wrap {
      position: relative;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 0.6s;
    }

    .count {
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 300;
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.02em;
      font-style: italic;
      position: relative;
    }
    .count::before {
      content: attr(data-n);
      position: absolute;
      inset: 0;
      color: var(--accent);
      filter: blur(40px);
      opacity: 0.15;
      z-index: -1;
    }

    .divider {
      width: 1px;
      height: 4rem;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
      margin: 1.5rem auto;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 0.9s;
    }

    .label-bottom {
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      font-style: italic;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
      max-width: 28ch;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 1.1s;
    }
    .label-bottom em { color: var(--accent); font-style: normal; }

    /* ── THOUGHTS BUTTON ── */
    .thoughts-btn {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.1em;
      padding: 0.65rem 1.6rem;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 1.4s;
      transition: background 0.25s, box-shadow 0.25s;
      position: relative;
      z-index: 10;
    }
    .thoughts-btn::before {
      content: '';
      position: absolute;
      inset: -4px;
      border: 1px solid rgba(200,169,126,0.15);
      pointer-events: none;
    }
    .thoughts-btn:hover {
      background: rgba(200,169,126,0.08);
      box-shadow: 0 0 28px rgba(200,169,126,0.18);
    }
    .thoughts-btn .btn-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.5); }
    }

    .last-updated {
      position: fixed;
      bottom: 2rem; right: 2.5rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 1.5s;
    }

    .corner-mark {
      position: fixed;
      top: 2rem; left: 2.5rem;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0;
      animation: fadeUp 1s ease forwards 2s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .count.tick { animation: tick 0.3s ease; }
    @keyframes tick {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    /* ── MODAL OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 7, 5, 0.92);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      max-width: 340px;
      width: 90%;
    }

    .modal-title {
      font-size: 1.05rem;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
    }
    .modal-title em { color: var(--accent); font-style: normal; }

    .modal-hint {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .modal input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--muted);
      color: var(--text);
      font-family: 'Courier Prime', monospace;
      font-size: 1rem;
      padding: 0.5rem 0;
      text-align: center;
      letter-spacing: 0.3em;
      outline: none;
      width: 16ch;
      transition: border-color 0.3s;
    }
    .modal input:focus { border-color: var(--accent); }

    .modal-error {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      color: var(--red);
      letter-spacing: 0.1em;
      min-height: 1em;
    }

    .modal-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn:hover { border-color: var(--accent); color: var(--accent); }

    .modal-close {
      position: fixed;
      top: 1.5rem; right: 2rem;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Courier Prime', monospace;
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s;
      z-index: 201;
    }
    .modal-close:hover { color: var(--text); }

    /* ── THOUGHTS LIST ── */
    .thoughts-list {
      width: 100%;
      max-height: 60vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      padding-right: 0.5rem;
    }
    .thoughts-list::-webkit-scrollbar { width: 2px; }
    .thoughts-list::-webkit-scrollbar-thumb { background: var(--muted); }

    .thought-entry {
      border-left: 1px solid rgba(107,95,85,0.4);
      padding-left: 1rem;
    }

    .thought-date {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-bottom: 0.35rem;
    }

    .thought-text {
      font-style: italic;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.65;
    }

    .thoughts-empty {
      font-style: italic;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .list-title {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    #thoughts-modal { max-width: 420px; }

  .add-note-btn {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    border-color: rgba(107,95,85,0.4);
    margin-top: 0.5rem;
  }
  .add-note-btn:hover { border-color: var(--accent); color: var(--accent); }

  #inline-note-input:focus { border-color: var(--accent); }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="corner-mark"></div>

<div class="scene">
  <div class="count-wrap">
    <div class="count" id="count" data-n="…">…</div>
  </div>

  <div class="divider"></div>

  <div class="label-bottom">
    times i thought of <em>you</em><br>
    since i made this <em>(april 1)</em>
  </div>

  <button class="thoughts-btn" onclick="openModal()">
    <span class="btn-dot"></span>
    what was i thinking about ?
  </button>
</div>

<div class="last-updated" id="last-updated"></div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <button class="modal-close" onclick="closeModal()">✕</button>

  <!-- gate 1: birthdate -->
  <div class="modal" id="gate1">
    <div class="modal-title">what's <em>your</em> birthdate ?</div>
    <div class="modal-hint">dd mm yy</div>
    <input type="password" id="g1-input" placeholder="· · · · · ·" autocomplete="off" inputmode="numeric"/>
    <div class="modal-error" id="g1-error"></div>
    <button class="modal-btn" onclick="checkGate1()">enter</button>
  </div>

  <!-- gate 2: planet -->
  <div class="modal" id="gate2" style="display:none">
    <div class="modal-title">our <em>planet</em></div>
    <div class="modal-hint">hint — our planet</div>
    <input type="text" id="g2-input" placeholder="· · · · · ·" autocomplete="off"/>
    <div class="modal-error" id="g2-error"></div>
    <button class="modal-btn" onclick="checkGate2()">enter</button>
  </div>

  <!-- thoughts list -->
  <div class="modal" id="thoughts-modal" style="display:none">
    <div class="list-title" id="thoughts-header">thoughts</div>
    <div class="thoughts-list" id="thoughts-list">
      <div class="thoughts-empty">nothing yet…</div>
    </div>
    <button class="modal-btn add-note-btn" onclick="showAddNote()">+ add a note</button>
    <div id="add-note-area" style="display:none; width:100%; display:none; flex-direction:column; align-items:center; gap:0.8rem;">
      <textarea id="inline-note-input" placeholder="i was thinking about…" rows="3" style="width:100%;background:transparent;border:1px solid var(--muted);color:var(--text);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;line-height:1.7;padding:0.75rem 1rem;outline:none;resize:none;transition:border-color 0.3s;"></textarea>
      <button class="modal-btn" style="border-color:var(--accent);color:var(--accent);" onclick="saveInlineNote()">save</button>
      <div id="inline-note-feedback" style="font-family:'Courier Prime',monospace;font-size:0.7rem;letter-spacing:0.15em;min-height:1em;color:#4a7a5a;"></div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA96e5SPjrjwQfM0wTYIWmN17fwmllQjsw",
    authDomain: "ivebeenthinkinboutyou.firebaseapp.com",
    databaseURL: "https://ivebeenthinkinboutyou-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ivebeenthinkinboutyou",
    storageBucket: "ivebeenthinkinboutyou.firebasestorage.app",
    messagingSenderId: "51379647443",
    appId: "1:51379647443:web:03205ec0ee3b75d1d87526"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const countEl = document.getElementById('count');
  const lastEl  = document.getElementById('last-updated');

  onValue(ref(db, 'thoughts'), (snap) => {
    const data = snap.val() || {};
    const n    = data.count ?? 0;
    const ts   = data.lastUpdated ?? null;

    countEl.textContent = n.toLocaleString();
    countEl.setAttribute('data-n', n.toLocaleString());
    countEl.classList.remove('tick');
    void countEl.offsetWidth;
    countEl.classList.add('tick');

    if (ts) {
      const d = new Date(ts);
      lastEl.textContent = `last — ${d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })}`;
    }
  });

  window.saveInlineNote = async () => {
    const text = document.getElementById('inline-note-input').value.trim();
    if (!text) return;
    await push(ref(db, 'notes'), { text, ts: new Date().toISOString() });
    document.getElementById('inline-note-input').value = '';
    const fb = document.getElementById('inline-note-feedback');
    fb.textContent = 'saved ✓';
    setTimeout(() => fb.textContent = '', 2000);
    document.getElementById('add-note-area').style.display = 'none';
  };

  window.loadThoughts = () => {
    onValue(ref(db, 'notes'), (snap) => {
      const listEl = document.getElementById('thoughts-list');
      const data   = snap.val();

      if (!data) {
        listEl.innerHTML = '<div class="thoughts-empty">nothing yet…</div>';
        return;
      }

      const entries = Object.values(data).sort((a, b) => new Date(b.ts) - new Date(a.ts));
      listEl.innerHTML = '';

      entries.forEach(entry => {
        const d       = new Date(entry.ts);
        const dateStr = d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
        const timeStr = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

        const el = document.createElement('div');
        el.className = 'thought-entry';
        el.innerHTML = `
          <div class="thought-date">${dateStr} — ${timeStr}</div>
          <div class="thought-text">${entry.text}</div>
        `;
        listEl.appendChild(el);
      });

      document.getElementById('thoughts-header').textContent =
        `${entries.length} thought${entries.length !== 1 ? 's' : ''}`;
    });
  };
</script>

<script>
  const GATE1 = "291208";
  const GATE2 = "jupiter";

  function openModal() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('gate1').style.display  = 'flex';
    document.getElementById('gate2').style.display  = 'none';
    document.getElementById('thoughts-modal').style.display = 'none';
    document.getElementById('g1-input').value = '';
    document.getElementById('g1-error').textContent = '';
    setTimeout(() => document.getElementById('g1-input').focus(), 100);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  function checkGate1() {
    const val = document.getElementById('g1-input').value.trim();
    if (val === GATE1) {
      document.getElementById('gate1').style.display = 'none';
      document.getElementById('gate2').style.display = 'flex';
      document.getElementById('g2-input').value = '';
      setTimeout(() => document.getElementById('g2-input').focus(), 100);
    } else {
      const err = document.getElementById('g1-error');
      err.textContent = 'wrong.';
      setTimeout(() => err.textContent = '', 1500);
    }
  }

  function checkGate2() {
    const val = document.getElementById('g2-input').value.trim().toLowerCase();
    if (val === GATE2) {
      document.getElementById('gate2').style.display = 'none';
      document.getElementById('thoughts-modal').style.display = 'flex';
      window.loadThoughts();
      // Discord webhook log
      const now = new Date();
      const ts  = now.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })
                + ' — ' + now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      fetch('https://discord.com/api/webhooks/1488847895003271168/i7dC3ruDDWURIyjUtS5GtLr7vXXgRmuphgZim944c3D0fBz_Mp_Ol5N_d1KPpUfotWtC', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: '🌙 she unlocked the thoughts — ' + ts })
      }).catch(() => {});
    } else {
      const err = document.getElementById('g2-error');
      err.textContent = 'wrong.';
      setTimeout(() => err.textContent = '', 1500);
    }
  }

  function showAddNote() {
    const area = document.getElementById('add-note-area');
    const isHidden = area.style.display === 'none' || area.style.display === '';
    area.style.display = isHidden ? 'flex' : 'none';
    if (isHidden) setTimeout(() => document.getElementById('inline-note-input').focus(), 50);
  }

  document.getElementById('g1-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkGate1(); });
  document.getElementById('g2-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkGate2(); });

  // particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 2 + 1;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px; height: ${size}px;
      --dx: ${(Math.random() - 0.5) * 120}px;
      animation-duration: ${Math.random() * 15 + 12}s;
      animation-delay: ${Math.random() * 15}s;
    `;
    container.appendChild(p);
  }
</script>

</body>
</html>
