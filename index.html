<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>for you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0705;
      --surface: #110e0b;
      --text: #e8ddd0;
      --muted: #6b5f55;
      --accent: #c8a97e;
      --red: #8b3a3a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 1px;
      height: 1px;
      background: var(--accent);
      border-radius: 50%;
      animation: drift linear infinite;
      opacity: 0;
    }

    @keyframes drift {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-10vh) translateX(var(--dx)); opacity: 0; }
    }

    .label-top {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Courier Prime', monospace;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.3s;
      margin-bottom: 2rem;
    }

    .count-wrap {
      position: relative;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 0.6s;
    }

    .count {
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 300;
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.02em;
      font-style: italic;
      position: relative;
    }

    /* soft glow behind number */
    .count::before {
      content: attr(data-n);
      position: absolute;
      inset: 0;
      color: var(--accent);
      filter: blur(40px);
      opacity: 0.15;
      z-index: -1;
    }

    .divider {
      width: 1px;
      height: 4rem;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
      margin: 1.5rem auto;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 0.9s;
    }

    .label-bottom {
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      font-style: italic;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
      max-width: 28ch;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 1.1s;
    }

    .label-bottom em {
      color: var(--accent);
      font-style: normal;
    }

    /* small date bottom-right */
    .last-updated {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 1.5s;
    }

    /* tiny top-left dot just for aesthetics */
    .corner-mark {
      position: fixed;
      top: 2rem;
      left: 2.5rem;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0;
      animation: fadeUp 1s ease forwards 2s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* number tick animation */
    .count.tick {
      animation: tick 0.3s ease;
    }
    @keyframes tick {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="corner-mark"></div>

<div class="scene">
  <div class="count-wrap">
    <div class="count" id="count" data-n="…">…</div>
  </div>

  <div class="divider"></div>

  <div class="label-bottom">
    times i thought of <em>you</em><br>
    since i made this <em>(april 1)</em>
  </div>
</div>

<div class="last-updated" id="last-updated"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── REPLACE WITH YOUR FIREBASE CONFIG ──
  const firebaseConfig = {
    apiKey: "AIzaSyA96e5SPjrjwQfM0wTYIWmN17fwmllQjsw",
    authDomain: "ivebeenthinkinboutyou.firebaseapp.com",
    databaseURL: "https://ivebeenthinkinboutyou-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ivebeenthinkinboutyou",
    storageBucket: "ivebeenthinkinboutyou.firebasestorage.app",
    messagingSenderId: "51379647443",
    appId: "1:51379647443:web:03205ec0ee3b75d1d87526"
  };
  // ────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const countEl   = document.getElementById('count');
  const lastEl    = document.getElementById('last-updated');

  onValue(ref(db, 'thoughts'), (snap) => {
    const data = snap.val() || {};
    const n    = data.count ?? 0;
    const ts   = data.lastUpdated ?? null;

    countEl.textContent = n.toLocaleString();
    countEl.setAttribute('data-n', n.toLocaleString());
    countEl.classList.remove('tick');
    void countEl.offsetWidth;
    countEl.classList.add('tick');

    if (ts) {
      const d = new Date(ts);
      lastEl.textContent = `last — ${d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })}`;
    }
  });
</script>

<script>
  // generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 2 + 1;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      --dx: ${(Math.random() - 0.5) * 120}px;
      animation-duration: ${Math.random() * 15 + 12}s;
      animation-delay: ${Math.random() * 15}s;
    `;
    container.appendChild(p);
  }
</script>

</body>
</html>
