<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>for you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0705;
      --text: #e8ddd0;
      --muted: #6b5f55;
      --accent: #c8a97e;
      --red: #8b3a3a;
      --her: #7a8b6b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 100; opacity: 0.6;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 99;
    }

    .scene {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* particles */
    .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; width: 1px; height: 1px;
      background: var(--accent); border-radius: 50%;
      animation: drift linear infinite; opacity: 0;
    }
    @keyframes drift {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-10vh) translateX(var(--dx)); opacity: 0; }
    }

    .count-wrap { opacity: 0; animation: fadeUp 1.4s ease forwards 0.6s; }
    .count {
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 300; line-height: 1;
      color: var(--text); letter-spacing: -0.02em;
      font-style: italic; position: relative;
    }
    .count::before {
      content: attr(data-n); position: absolute; inset: 0;
      color: var(--accent); filter: blur(40px); opacity: 0.15; z-index: -1;
    }

    .divider {
      width: 1px; height: 4rem;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
      margin: 1.5rem auto; opacity: 0;
      animation: fadeUp 1.4s ease forwards 0.9s;
    }

    .label-bottom {
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      font-style: italic; color: var(--muted);
      text-align: center; line-height: 1.8; max-width: 28ch;
      opacity: 0; animation: fadeUp 1.4s ease forwards 1.1s;
    }
    .label-bottom em { color: var(--accent); font-style: normal; }

    .thoughts-btn {
      margin-top: 2.5rem;
      display: flex; align-items: center; gap: 0.6rem;
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.1em; padding: 0.65rem 1.6rem;
      cursor: pointer; opacity: 0;
      animation: fadeUp 1.4s ease forwards 1.4s;
      transition: background 0.25s, box-shadow 0.25s;
      position: relative; z-index: 10;
    }
    .thoughts-btn::before {
      content: ''; position: absolute; inset: -4px;
      border: 1px solid rgba(200,169,126,0.15); pointer-events: none;
    }
    .thoughts-btn:hover {
      background: rgba(200,169,126,0.08);
      box-shadow: 0 0 28px rgba(200,169,126,0.18);
    }
    .thoughts-btn .btn-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); animation: pulse 2s ease infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.5); }
    }

    .last-updated {
      position: fixed; bottom: 2rem; right: 2.5rem;
      font-family: 'Courier Prime', monospace; font-size: 0.65rem;
      color: var(--muted); letter-spacing: 0.15em;
      opacity: 0; animation: fadeUp 1.4s ease forwards 1.5s;
    }
    .corner-mark {
      position: fixed; top: 2rem; left: 2.5rem;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--red); opacity: 0;
      animation: fadeUp 1s ease forwards 2s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .count.tick { animation: tick 0.3s ease; }
    @keyframes tick {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,7,5,0.93);
      backdrop-filter: blur(10px);
      z-index: 200; display: flex;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal-close {
      position: fixed; top: 1.5rem; right: 2rem;
      background: none; border: none; color: var(--muted);
      font-family: 'Courier Prime', monospace; font-size: 1rem;
      cursor: pointer; transition: color 0.2s; z-index: 201;
    }
    .modal-close:hover { color: var(--text); }

    /* gate modals */
    .gate {
      display: flex; flex-direction: column;
      align-items: center; gap: 1.4rem;
      max-width: 340px; width: 90%;
    }
    .gate-title {
      font-size: 1.05rem; font-style: italic;
      color: var(--muted); letter-spacing: 0.05em; text-align: center;
    }
    .gate-title em { color: var(--accent); font-style: normal; }
    .gate-hint {
      font-family: 'Courier Prime', monospace; font-size: 0.65rem;
      color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase;
    }
    .gate input {
      background: transparent; border: none;
      border-bottom: 1px solid var(--muted);
      color: var(--text); font-family: 'Courier Prime', monospace;
      font-size: 1rem; padding: 0.5rem 0; text-align: center;
      letter-spacing: 0.3em; outline: none; width: 16ch;
      transition: border-color 0.3s;
    }
    .gate input:focus { border-color: var(--accent); }
    .gate-error {
      font-family: 'Courier Prime', monospace; font-size: 0.7rem;
      color: var(--red); letter-spacing: 0.1em; min-height: 1em;
    }
    .gate-btn {
      background: transparent; border: 1px solid var(--muted);
      color: var(--muted); font-family: 'Courier Prime', monospace;
      font-size: 0.75rem; letter-spacing: 0.2em;
      padding: 0.5rem 1.5rem; cursor: pointer; transition: all 0.2s;
    }
    .gate-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* gate transitions */
    .gate {
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .gate.fade-out {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
    }
    .gate.fade-in-start {
      opacity: 0;
      transform: translateY(14px);
    }

    /* ── THOUGHTS PANEL ── */
    #thoughts-panel {
      display: none;
      flex-direction: column;
      width: min(520px, 92vw);
      max-height: 82vh;
      gap: 0;
    }

    .panel-header {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--muted);
      text-align: center; padding-bottom: 1.2rem;
      border-bottom: 1px solid rgba(107,95,85,0.2);
      margin-bottom: 0;
    }

    /* tabs */
    .tabs {
      display: flex; border-bottom: 1px solid rgba(107,95,85,0.2);
    }
    .tab {
      flex: 1; padding: 0.75rem 0;
      font-family: 'Courier Prime', monospace;
      font-size: 0.62rem; letter-spacing: 0.2em;
      text-transform: uppercase; text-align: center;
      color: var(--muted); cursor: pointer;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px; transition: all 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .tab-content { display: none; flex-direction: column; overflow: hidden; flex: 1; }
    .tab-content.active { display: flex; }

    /* scrollable list */
    .thoughts-scroll {
      overflow-y: auto; flex: 1; padding: 1rem 0;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .thoughts-scroll::-webkit-scrollbar { width: 2px; }
    .thoughts-scroll::-webkit-scrollbar-thumb { background: var(--muted); }

    /* accordion day group */
    .day-group { border: 1px solid rgba(107,95,85,0.2); }
    .day-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    .day-header:hover { background: rgba(200,169,126,0.04); }
    .day-header-left { display: flex; align-items: center; gap: 0.75rem; }
    .day-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.62rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
    }
    .day-count {
      font-family: 'Courier Prime', monospace;
      font-size: 0.55rem; color: var(--muted);
      background: rgba(107,95,85,0.2);
      padding: 0.1rem 0.4rem; border-radius: 2px;
    }
    .day-arrow {
      font-size: 0.6rem; color: var(--muted);
      transition: transform 0.25s; user-select: none;
    }
    .day-group.open .day-arrow { transform: rotate(90deg); }

    .day-body {
      display: none; flex-direction: column;
      border-top: 1px solid rgba(107,95,85,0.15);
    }
    .day-group.open .day-body { display: flex; }

    /* individual thought */
    .thought-item {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid rgba(107,95,85,0.1);
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .thought-item:last-child { border-bottom: none; }

    .thought-meta {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .thought-num {
      font-family: 'Courier Prime', monospace;
      font-size: 0.55rem; letter-spacing: 0.15em;
      color: var(--accent); opacity: 0.7; flex-shrink: 0;
    }
    .thought-time {
      font-family: 'Courier Prime', monospace;
      font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em;
    }
    .thought-text {
      font-style: italic; font-size: 1rem;
      color: var(--text); line-height: 1.65;
      padding-left: 2.2rem;
    }
    .thought-img {
      padding-left: 2.2rem; margin-top: 0.25rem;
    }
    .thought-img img {
      max-width: 100%; max-height: 200px;
      object-fit: cover; opacity: 0.85;
      border: 1px solid rgba(107,95,85,0.3);
    }

    /* g */
    .her-note-item {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid rgba(107,95,85,0.1);
      border-left: 2px solid var(--her);
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .her-note-item:last-child { border-bottom: none; }
    .her-note-date {
      font-family: 'Courier Prime', monospace;
      font-size: 0.58rem; color: var(--her); letter-spacing: 0.1em; opacity: 0.8;
    }
    .her-note-text {
      font-style: italic; font-size: 1rem;
      color: var(--text); line-height: 1.65;
    }

    /* add note area */
    .add-note-bar {
      padding: 0.75rem 0 0;
      border-top: 1px solid rgba(107,95,85,0.2);
      display: flex; justify-content: center;
    }
    .add-note-toggle {
      background: transparent; border: 1px solid rgba(107,95,85,0.4);
      color: var(--muted); font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 0.85rem; letter-spacing: 0.1em;
      padding: 0.45rem 1.2rem; cursor: pointer; transition: all 0.2s;
    }
    .add-note-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .add-note-form {
      display: none; flex-direction: column;
      gap: 0.8rem; padding: 0.75rem 0 0; width: 100%;
    }
    .add-note-form.open { display: flex; }

    .add-note-form textarea {
      width: 100%; background: transparent;
      border: 1px solid var(--muted);
      color: var(--text); font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 0.95rem; line-height: 1.7;
      padding: 0.65rem 0.9rem; outline: none; resize: none;
      transition: border-color 0.3s; min-height: 70px;
    }
    .add-note-form textarea:focus { border-color: var(--accent); }
    .add-note-form textarea::placeholder { color: var(--muted); opacity: 0.6; }

    .add-note-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .btn-save-note {
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); font-family: 'Courier Prime', monospace;
      font-size: 0.7rem; letter-spacing: 0.15em;
      padding: 0.4rem 1rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-save-note:hover { background: var(--accent); color: var(--bg); }

    .note-fb {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem; color: #4a7a5a; letter-spacing: 0.1em;
      text-align: right; min-height: 1em;
    }

    .empty-state {
      font-style: italic; color: var(--muted);
      font-size: 0.9rem; text-align: center;
      padding: 2rem 0;
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="corner-mark"></div>

<div class="scene">
  <div class="count-wrap">
    <div class="count" id="count" data-n="…">…</div>
  </div>
  <div class="divider"></div>
  <div class="label-bottom">
    times i thought of <em>you</em><br>
    since i made this <em>(april 1)</em>
  </div>
  <button class="thoughts-btn" onclick="openModal()">
    <span class="btn-dot"></span>
    what was i thinking about ?
  </button>
</div>

<div class="last-updated" id="last-updated"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <button class="modal-close" onclick="closeModal()">✕</button>

  <!-- gate 1 -->
  <div class="gate" id="gate1">
    <div class="gate-title">what's <em>your</em> birthdate ?</div>
    <div class="gate-hint">dd mm yy</div>
    <input type="password" id="g1-input" placeholder="· · · · · ·" autocomplete="off" inputmode="numeric"/>
    <div class="gate-error" id="g1-error"></div>
    <button class="gate-btn" onclick="checkGate1()">enter</button>
  </div>

  <!-- gate 2 -->
  <div class="gate" id="gate2" style="display:none">
    <div class="gate-title">our <em>planet</em></div>
    <div class="gate-hint">hint — our planet</div>
    <input type="text" id="g2-input" placeholder="· · · · · ·" autocomplete="off"/>
    <div class="gate-error" id="g2-error"></div>
    <button class="gate-btn" onclick="checkGate2()">enter</button>
  </div>

  <!-- thoughts panel -->
  <div id="thoughts-panel">
    <div class="panel-header" id="panel-header">thoughts</div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('his')">y</div>
      <div class="tab" onclick="switchTab('hers')">g</div>
    </div>

    <!-- y tab -->
    <div class="tab-content active" id="tab-his">
      <div class="thoughts-scroll" id="his-list">
        <div class="empty-state">nothing yet…</div>
      </div>
    </div>

    <!-- g tab -->
    <div class="tab-content" id="tab-hers">
      <div class="thoughts-scroll" id="her-list">
        <div class="empty-state">nothing yet…</div>
      </div>
      <div class="add-note-bar">
        <button class="add-note-toggle" onclick="toggleNoteForm()">ADD A NOTE</button>
      </div>
      <div class="add-note-form" id="add-note-form">
        <textarea id="her-note-input" placeholder="write something…" rows="3"></textarea>
        <div class="add-note-actions">
          <button class="btn-save-note" onclick="saveHerNote()">save</button>
        </div>
        <div class="note-fb" id="note-fb"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA96e5SPjrjwQfM0wTYIWmN17fwmllQjsw",
    authDomain: "ivebeenthinkinboutyou.firebaseapp.com",
    databaseURL: "https://ivebeenthinkinboutyou-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ivebeenthinkinboutyou",
    storageBucket: "ivebeenthinkinboutyou.firebasestorage.app",
    messagingSenderId: "51379647443",
    appId: "1:51379647443:web:03205ec0ee3b75d1d87526"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // count
  onValue(ref(db, 'thoughts'), snap => {
    const data = snap.val() || {};
    const n    = data.count ?? 0;
    const ts   = data.lastUpdated ?? null;
    const countEl = document.getElementById('count');
    countEl.textContent = n.toLocaleString();
    countEl.setAttribute('data-n', n.toLocaleString());
    countEl.classList.remove('tick');
    void countEl.offsetWidth;
    countEl.classList.add('tick');
    if (ts) {
      const d = new Date(ts);
      document.getElementById('last-updated').textContent =
        `last — ${d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })}`;
    }
  });

  // load y (notes) — grouped by day, numbered globally oldest→newest
  function linkify(text) {
    return text.replace(/(https?:\/\/[^\s<]+)/g,
      '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;text-underline-offset:3px;opacity:0.85;">$1</a>');
  }

  window.loadHisThoughts = () => {
    onValue(ref(db, 'notes'), snap => {
      const listEl = document.getElementById('his-list');
      const data   = snap.val();
      if (!data) { listEl.innerHTML = '<div class="empty-state">nothing yet…</div>'; return; }

      const entries = Object.values(data).sort((a,b) => new Date(a.ts) - new Date(b.ts));

      // group by calendar date
      const groups = {};
      entries.forEach((e, idx) => {
        e._num = idx + 1;
        const day = new Date(e.ts).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
        if (!groups[day]) groups[day] = [];
        groups[day].push(e);
      });

      listEl.innerHTML = '';
      const days = Object.keys(groups).reverse(); // most recent day first
      days.forEach((day, di) => {
        const items = groups[day];
        const grp   = document.createElement('div');
        grp.className = 'day-group' + (di === 0 ? ' open' : '');

        grp.innerHTML = `
          <div class="day-header" onclick="this.parentElement.classList.toggle('open')">
            <div class="day-header-left">
              <span class="day-label">${day}</span>
              <span class="day-count">${items.length}</span>
            </div>
            <span class="day-arrow">›</span>
          </div>
          <div class="day-body">
            ${items.map(e => {
              const time = new Date(e.ts).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
              const imgHtml = e.imageUrl
                ? `<div class="thought-img"><img src="${e.imageUrl}" loading="lazy"/></div>`
                : '';
              const vidHtml = e.videoUrl
                ? `<div class="thought-img"><video src="${e.videoUrl}" controls preload="metadata" style="max-width:100%;max-height:220px;opacity:0.85;border:1px solid rgba(107,95,85,0.3);"></video></div>`
                : '';
              return `
                <div class="thought-item">
                  <div class="thought-meta">
                    <span class="thought-num">thought ${e._num}</span>
                    <span class="thought-time">${time}</span>
                  </div>
                  <div class="thought-text">${linkify(e.text || '')}</div>
                  ${imgHtml}
                  ${vidHtml}
                </div>`;
            }).join('')}
          </div>`;
        listEl.appendChild(grp);
      });

      document.getElementById('panel-header').textContent =
        `${entries.length} thought${entries.length !== 1 ? 's' : ''}`;
    });
  };

  // load g
  window.loadHerNotes = () => {
    onValue(ref(db, 'hernotes'), snap => {
      const listEl = document.getElementById('her-list');
      const data   = snap.val();
      if (!data) { listEl.innerHTML = '<div class="empty-state">nothing yet…</div>'; return; }
      const entries = Object.values(data).sort((a,b) => new Date(b.ts) - new Date(a.ts));
      listEl.innerHTML = entries.map(e => {
        const d = new Date(e.ts);
        const dateStr = d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
        const timeStr = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        return `<div class="her-note-item">
          <div class="her-note-date">${dateStr} — ${timeStr}</div>
          <div class="her-note-text">${e.text}</div>
        </div>`;
      }).join('');
    });
  };

  window.saveHerNote = async () => {
    const text = document.getElementById('her-note-input').value.trim();
    if (!text) return;
    await push(ref(db, 'hernotes'), { text, ts: new Date().toISOString() });
    document.getElementById('her-note-input').value = '';
    document.getElementById('add-note-form').classList.remove('open');
    const fb = document.getElementById('note-fb');
    fb.textContent = 'saved ✓';
    setTimeout(() => fb.textContent = '', 2000);
  };
</script>

<script>
  const GATE1    = "291208";
  const GATE2    = "jupiter";
  const WEBHOOK  = "https://discord.com/api/webhooks/1488847895003271168/i7dC3ruDDWURIyjUtS5GtLr7vXXgRmuphgZim944c3D0fBz_Mp_Ol5N_d1KPpUfotWtC";

  function openModal() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('gate1').style.display = 'flex';
    document.getElementById('gate2').style.display = 'none';
    document.getElementById('thoughts-panel').style.display = 'none';
    document.getElementById('g1-input').value = '';
    document.getElementById('g1-error').textContent = '';
    setTimeout(() => document.getElementById('g1-input').focus(), 100);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  function checkGate1() {
    const val = document.getElementById('g1-input').value.trim();
    if (val === GATE1) {
      const g1 = document.getElementById('gate1');
      const g2 = document.getElementById('gate2');
      g1.classList.add('fade-out');
      setTimeout(() => {
        g1.style.display = 'none';
        g1.classList.remove('fade-out');
        g2.style.display = 'flex';
        g2.classList.add('fade-in-start');
        void g2.offsetWidth;
        g2.classList.remove('fade-in-start');
        document.getElementById('g2-input').value = '';
        setTimeout(() => document.getElementById('g2-input').focus(), 50);
      }, 350);
    } else {
      const err = document.getElementById('g1-error');
      err.textContent = 'wrong.';
      setTimeout(() => err.textContent = '', 1500);
    }
  }

  async function checkGate2() {
    const val = document.getElementById('g2-input').value.trim().toLowerCase();
    if (val === GATE2) {
      const g2 = document.getElementById('gate2');
      const panel = document.getElementById('thoughts-panel');
      g2.classList.add('fade-out');
      setTimeout(() => {
        g2.style.display = 'none';
        g2.classList.remove('fade-out');
        panel.style.display = 'flex';
        panel.style.opacity = '0';
        panel.style.transform = 'translateY(14px)';
        panel.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
        void panel.offsetWidth;
        panel.style.opacity = '1';
        panel.style.transform = 'translateY(0)';
      }, 350);
      window.loadHisThoughts();
      window.loadHerNotes();

      // get IP info then log to Discord
      try {
        const ipRes  = await fetch('https://ipapi.co/json/');
        const ipData = await ipRes.json();
        const now    = new Date();
        const ts     = now.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })
                     + ' — ' + now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

        const msg = [
          `🌙 **she unlocked the thoughts**`,
          `🕐 ${ts}`,
          `🌍 ${ipData.country_name || '?'} — ${ipData.city || '?'}`,
          `📡 ${ipData.org || '?'}`,
          `🔌 IP: \`${ipData.ip || '?'}\``,
          `💻 ${navigator.userAgent}`
        ].join('\n');

        await fetch(WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: msg })
        });
      } catch(e) {}

    } else {
      const err = document.getElementById('g2-error');
      err.textContent = 'wrong.';
      setTimeout(() => err.textContent = '', 1500);
    }
  }

  function switchTab(which) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (i === 0 && which === 'his') || (i === 1 && which === 'hers'));
    });
    document.getElementById('tab-his').classList.toggle('active', which === 'his');
    document.getElementById('tab-hers').classList.toggle('active', which === 'hers');
  }

  function toggleNoteForm() {
    document.getElementById('add-note-form').classList.toggle('open');
    setTimeout(() => document.getElementById('her-note-input').focus(), 50);
  }

  document.getElementById('g1-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkGate1(); });
  document.getElementById('g2-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkGate2(); });
  document.getElementById('her-note-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.saveHerNote(); }
  });

  // particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 2 + 1;
    p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;--dx:${(Math.random()-0.5)*120}px;animation-duration:${Math.random()*15+12}s;animation-delay:${Math.random()*15}s;`;
    container.appendChild(p);
  }
</script>
